version: "3.9"

# =============================================================================
# AI News Aggregator — Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up -d        # start
#   docker compose -f docker/docker-compose.yml down         # stop
#   docker compose -f docker/docker-compose.yml down -v      # stop + wipe volumes
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary data store
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ai_news_db

    # Restart automatically unless you explicitly stop the container.
    # Useful for dev machines that reboot and production servers.
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_news}
      POSTGRES_USER: ${POSTGRES_USER:-ai_news_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      # Tune connection settings for a lightweight dev container.
      # In production, use PgBouncer or an RDS parameter group instead.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

    ports:
      # HOST:CONTAINER — expose only on localhost so the DB is not reachable
      # from the public internet on dev machines.
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Named volume — data survives container restarts and rebuilds.
      - postgres_data:/var/lib/postgresql/data
      # Mount init scripts — Postgres runs *.sql / *.sh files in alphabetical
      # order the FIRST TIME the volume is created (i.e. when the DB is brand new).
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      # pg_isready exits 0 when the server is accepting connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_news_user} -d ${POSTGRES_DB:-ai_news}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - backend

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — optional web UI for browsing the DB during development.
  # Remove this service (or comment it out) before deploying to production.
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_news_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"        # skip login page in dev
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      db:
        condition: service_healthy

    networks:
      - backend

# =============================================================================
# Named volumes — managed by Docker, persist across container restarts.
# =============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# =============================================================================
# Networks — isolates the backend services from other containers on the host.
# =============================================================================
networks:
  backend:
    driver: bridge